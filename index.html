<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Health Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-value { font-size: 2em; font-weight: bold; color: #667eea; }
        .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .chart-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="header">
        <h1>💪 Health Dashboard</h1>
        <p>Actualizado: 2025-09-27 04:29:25</p>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-value">0.0</div>
            <div>Peso Actual (kg)</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">0</div>
            <div>Total Ejercicios</div>
        </div>
    </div>
    
    <div class="charts">
        <div class="chart-container">
            <h3>📊 Peso</h3>
            <canvas id="pesoChart"></canvas>
        </div>
        <div class="chart-container">
            <h3>🏃 Ejercicio</h3>
            <canvas id="ejercicioChart"></canvas>
        </div>
    </div>
    
    <script>
        const pesoData = [];
        const exerciseData = [];
        
        if (pesoData.length > 0) {
            const ctx1 = document.getElementById('pesoChart').getContext('2d');
            new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: pesoData.map(d => d.date),
                    datasets: [{
                        label: 'Peso (kg)',
                        data: pesoData.map(d => d.weight),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true
                    }]
                },
                options: { responsive: true }
            });
        }
        
        if (exerciseData.length > 0) {
            const actividadPorDia = {};
            exerciseData.forEach(ex => {
                if (!actividadPorDia[ex.date]) actividadPorDia[ex.date] = 0;
                actividadPorDia[ex.date] += ex.duration / 60;
            });
            
            const fechas = Object.keys(actividadPorDia).slice(-14);
            const valores = fechas.map(f => actividadPorDia[f]);
            
            const ctx2 = document.getElementById('ejercicioChart').getContext('2d');
            new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: fechas,
                    datasets: [{
                        label: 'Minutos',
                        data: valores,
                        backgroundColor: 'rgba(102, 126, 234, 0.8)'
                    }]
                },
                options: { responsive: true }
            });
        }
    </script>
</body>
</html>
